defaults:
  - _self_
  - profiles: smoke

profile: smoke
project_name: dashgo_navrl
seed: 42
device: cuda:0
headless: true
enable_cameras: false
max_frame_num: 100000
eval_interval_batches: 25
save_interval_batches: 25

env:
  autopilot_profile: gen2
  map_source: dashgo_official
  num_envs: 4
  env_spacing: 15.0
  episode_length_s: 90.0
  static_obstacles: 24
  dynamic_obstacles: 8

algo:
  training_frame_num: 32
  training_epoch_num: 4
  num_minibatches: 16
  entropy_loss_coefficient: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 5.0
  feature_extractor:
    learning_rate: 5.0e-4
  actor:
    learning_rate: 5.0e-4
    clip_ratio: 0.1
    action_limit: 1.0
  critic:
    learning_rate: 5.0e-4
    clip_ratio: 0.1

logging:
  print_interval_batches: 5

wandb:
  mode: disabled
  project: dashgo-navrl
  entity: null
  name: dashgo-navrl
  run_id: null
